<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 400px;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    /* Scale up when opened as a window */
    body.window-mode {
      width: 100%;
      max-width: 100vw;
      min-height: 100vh;
      font-size: 15px;
    }

    body.window-mode .header { padding: 24px; }
    body.window-mode .header h1 { font-size: 22px; }
    body.window-mode .body { padding: 20px 24px; }
    body.window-mode input[type="text"] { padding: 12px 16px; font-size: 15px; }
    body.window-mode #convert-btn { padding: 12px 22px; font-size: 15px; }
    body.window-mode .job-card { padding: 12px 14px; }
    body.window-mode .job-title { font-size: 14px; }
    body.window-mode .btn-bulk { padding: 11px 0; font-size: 13px; }

    .header {
      background: linear-gradient(135deg, #e53935, #ff0033);
      padding: 18px 20px;
      text-align: center;
    }

    .header { position: relative; }
    .header h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .header p { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 4px; }

    .btn-close-window {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 50%;
      background: rgba(0,0,0,0.25);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
    }
    .btn-close-window:hover { background: rgba(0,0,0,0.45); }
    .btn-close-window.visible { display: flex; }

    .body { padding: 16px 20px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-row { display: flex; gap: 8px; }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #16213e;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #ff0033; }
    input[type="text"]::placeholder { color: #555; }

    button#convert-btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #ff0033;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button#convert-btn:hover { background: #cc0029; }
    button#convert-btn:disabled { background: #555; cursor: not-allowed; }

    /* ── Status message ── */
    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .status.loading {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; background: #16213e; color: #aaa;
    }
    .status.success { display: block; background: #1b5e20; color: #a5d6a7; }
    .status.error { display: block; background: #b71c1c; color: #ef9a9a; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #444; border-top-color: #ff0033;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Jobs panel ── */
    .jobs-section {
      margin-top: 16px;
      border-top: 1px solid #2a2a4a;
      padding-top: 12px;
    }

    .jobs-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .jobs-header label { margin: 0; }

    .server-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }
    .server-dot.online { background: #4caf50; }
    .server-dot.offline { background: #f44336; }

    .server-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #777;
    }

    .btn-server-kill {
      border: none;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      background: #e53935;
      color: #fff;
      display: none;
    }
    .btn-server-kill:hover { background: #c62828; }
    .btn-server-kill.visible { display: inline-block; }

    .jobs-list {
      max-height: 220px;
      overflow-y: auto;
    }

    .job-card {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .job-info { flex: 1; min-width: 0; }

    .job-title {
      font-size: 13px;
      font-weight: 500;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .job-meta {
      font-size: 11px;
      color: #777;
      margin-top: 2px;
    }

    .job-status-badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .job-status-badge.converting { background: #1a3a5c; color: #64b5f6; }
    .job-status-badge.done { background: #1b3d1b; color: #81c784; }
    .job-status-badge.error { background: #3d1b1b; color: #e57373; }
    .job-status-badge.cancelled { background: #3d3d1b; color: #fff176; }

    .job-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .btn-small {
      border: none;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-stop { background: #e53935; color: #fff; }
    .btn-stop:hover { background: #c62828; }

    .btn-save { background: #2e7d32; color: #fff; }
    .btn-save:hover { background: #1b5e20; }

    .no-jobs {
      text-align: center;
      font-size: 12px;
      color: #555;
      padding: 12px;
    }

    /* ── Bulk actions bar ── */
    .bulk-actions {
      display: none;
      gap: 6px;
      margin-top: 10px;
    }

    .bulk-actions.visible { display: flex; }

    .btn-bulk {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 9px 0;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-align: center;
    }

    .btn-bulk:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-save-all { background: #2e7d32; color: #fff; }
    .btn-save-all:hover:not(:disabled) { background: #1b5e20; }

    .btn-clear { background: #37474f; color: #cfd8dc; }
    .btn-clear:hover:not(:disabled) { background: #263238; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 10px;
      font-size: 11px;
      color: #555;
      border-top: 1px solid #222;
    }
  </style>
</head>
<body>
  <div class="header">
    <button id="btn-close-window" class="btn-close-window" title="Close">&times;</button>
    <h1>YouTube to MP3</h1>
    <p>Paste a YouTube link to download as MP3</p>
  </div>

  <div class="body">
    <label for="url-input">YouTube URL</label>
    <div class="input-row">
      <input type="text" id="url-input" placeholder="https://youtube.com/watch?v=..." />
      <button id="convert-btn">Convert</button>
    </div>
    <div id="status" class="status"></div>

    <div class="jobs-section">
      <div class="jobs-header">
        <label>Conversions</label>
        <span class="server-status">
          <span id="server-dot" class="server-dot offline"></span>
          <span id="server-label">Checking...</span>
          <button id="btn-server-kill" class="btn-server-kill" title="Stop server">Kill</button>
        </span>
      </div>
      <div id="jobs-list" class="jobs-list">
        <div class="no-jobs">No active conversions</div>
      </div>
      <div id="bulk-actions" class="bulk-actions">
        <button id="btn-save-all" class="btn-bulk btn-save-all">Save All (.zip)</button>
        <button id="btn-clear" class="btn-bulk btn-clear">Clear List</button>
      </div>
    </div>
  </div>

  <div class="footer">
    Powered by yt-dlp &middot; Local Server on :5000
  </div>

  <script src="popup.js"></script>
</body>
</html>
